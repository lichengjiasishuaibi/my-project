<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的学习记录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px 0;
            border-bottom: 2px solid #42b983;
        }
        h1 {
            color: #42b983;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            font-size: 1.1rem;
        }
        .timeline {
            position: relative;
        }
        .timeline-item {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            position: relative;
        }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -30px;
            top: 25px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #42b983;
        }
        .timeline-date {
            color: #42b983;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .timeline-title {
            font-size: 1.3rem;
            margin-bottom: 8px;
            color: #2c3e50;
        }
        .timeline-content {
            color: #555;
        }
        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px 0;
            color: #999;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>我的学习记录</h1>
            <p class="subtitle">记录成长，见证进步</p >
        </header>

        <div class="timeline">
            <!-- 学习记录条目示例，你可以复制这个块来添加更多内容 -->
            <div class="timeline-item">
                <div class="timeline-date">2026年03月09日</div>
                <h3 class="timeline-title">开始搭建个人学习网站</h3>
                <div class="timeline-content">
                    <p>今天创建了这个网页，用来记录之后的学习过程。</p >
                </div>
            </div>

            <!-- 你后面可以在这里继续添加更多 .timeline-item -->
            <!--
            <div class="timeline-item">
                <div class="timeline-date">日期</div>
                <h3 class="timeline-title">学习主题</h3>
                <div class="timeline-content">
                    <p>学习内容...</p >
                </div>
            </div>
            -->
        </div>

        <footer>
            <p>© 2026 我的学习记录 | 持续更新中...</p >
        </footer>
    </div>
</body>
</html>
